<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="{{ site.baseurl }}/assets/images/favicon.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Supabase 설정값 주입 -->
  <script>
    window.SUPABASE_URL     = "{{ site.supabase_url }}";
    window.SUPABASE_ANON_KEY = "{{ site.supabase_anon_key }}";
  </script>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="{{ site.baseurl }}/"><img src="{{ site.baseurl }}/assets/images/delrium_logo.png" alt="DELRIUM" /></a>
  <ul class="nav-links" id="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#members">Members</a></li>
    <li><a href="#schedule">Schedule</a></li>
    <li><a href="#video">Video</a></li>
    <li><a href="#streaming">Streaming</a></li>
    <li><a href="#guestbook">Guestbook</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>

{{ content }}

<footer>
  &copy; 2026 DELRIUM
</footer>

<script>
  // 햄버거 메뉴
  const btn  = document.getElementById('hamburger');
  const menu = document.getElementById('nav-links');
  btn.addEventListener('click', () => {
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  });
  menu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      btn.classList.remove('open');
      menu.classList.remove('open');
    });
  });

  // 스크롤 페이드인/아웃
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
      } else {
        e.target.classList.remove('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
<script src="{{ site.baseurl }}/assets/js/guestbook.js"></script>
<script>
function openShowPopup(title, info) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-info').innerHTML = info.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--red)">$1</a>');
  document.getElementById('show-modal').classList.add('open');
}
function closeShowPopup() {
  document.getElementById('show-modal').classList.remove('open');
}
function openPosterModal(src) {
  document.getElementById('poster-full').src = src;
  document.getElementById('poster-modal').classList.add('open');
}
document.querySelectorAll('[data-popup-title]').forEach(el => {
  el.addEventListener('click', () => {
    const title = el.dataset.popupTitle;
    const info = el.dataset.popupInfo.replace(/\n/g, '<br>');
    openShowPopup(title, info);
  });
});

// Calendar
(function() {
  const shows = [
    {% for m in site.data.schedule %}{% for s in m.shows %}
    { month: "{{ m.month }}", date: "{{ s.date }}", title: {{ s.title | default: s.venue | jsonify }}, poster: "{% if s.poster %}{{ site.baseurl }}/assets/images/{{ s.poster }}{% endif %}" },
    {% endfor %}{% endfor %}
  ];
  function parseShowDate(monthStr, dateStr) {
    const y = parseInt(monthStr.match(/\d{4}/)[0]);
    const parts = dateStr.split('/');
    return new Date(y, parseInt(parts[0]) - 1, parseInt(parts[1]));
  }
  const showDates = shows.map(s => parseShowDate(s.month, s.date));
  const cal = document.getElementById('schedule-cal');
  let cur = new Date();
  function render() {
    const y = cur.getFullYear(), m = cur.getMonth();
    const first = new Date(y, m, 1), last = new Date(y, m + 1, 0);
    const today = new Date();
    const todayNorm = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    let html = `<div class="cal-nav">
      <button onclick="calNav(-1)">&lsaquo;</button>
      <span class="cal-month-label">${first.toLocaleString('en',{month:'long'})} ${y}</span>
      <button onclick="calNav(1)">&rsaquo;</button>
    </div><div class="cal-grid">`;
    days.forEach(d => html += `<div class="cal-head">${d}</div>`);
    for (let i = 0; i < first.getDay(); i++) html += `<div class="cal-day"></div>`;
    for (let d = 1; d <= last.getDate(); d++) {
      const dt = new Date(y, m, d);
      const isPast = dt < todayNorm;
      const isShow = showDates.some(sd => sd.getFullYear()===y && sd.getMonth()===m && sd.getDate()===d);
      const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
      let cls = 'cal-day current-month';
      if (isShow) cls += ' has-show';
      if (isToday) cls += ' today';
      const showInfo = isShow ? shows.find((s,i) => showDates[i].getFullYear()===y && showDates[i].getMonth()===m && showDates[i].getDate()===d) : null;
      const title = showInfo ? showInfo.title : '';
      const poster = showInfo ? showInfo.poster : '';
      const clickAttr = (isShow && isPast && poster) ? `onclick="openPosterModal('${poster}')"` : '';
      html += `<div class="${cls}" ${title ? `title="${title}"` : ''} ${clickAttr}>${d}</div>`;
    }
    html += '</div>';
    cal.innerHTML = html;
  }
  window.calNav = function(dir) { cur.setMonth(cur.getMonth() + dir); render(); };
  render();
})();
</script>
<script>
// 지난 공연 목록에서 제거
(function() {
  var today = new Date();
  today.setHours(0,0,0,0);
  document.querySelectorAll('.show-row[data-show-year]').forEach(function(row) {
    var year = parseInt(row.dataset.showYear);
    var parts = row.dataset.showMd.split('/');
    var showDate = new Date(year, parseInt(parts[0]) - 1, parseInt(parts[1]));
    if (showDate < today) row.remove();
  });
  document.querySelectorAll('.month-block').forEach(function(block) {
    if (!block.querySelector('.show-row')) block.remove();
  });
})();
</script>
</body>
</html>
